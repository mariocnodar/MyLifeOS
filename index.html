<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Nexus OS"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>Nexus OS</title>
  <link rel="apple-touch-icon" href="/icon.png"/>
  <link rel="icon" type="image/png" href="/icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f5f5f7;--bg2:#ffffff;--bg3:#ebebed;
      --border:rgba(0,0,0,0.08);
      --text:#0a0a0a;--text2:#666;--text3:#aaa;
      --green:#1a9e6e;--green-bg:rgba(26,158,110,0.1);
      --blue:#2563eb;--blue-bg:rgba(37,99,235,0.1);
      --amber:#d97706;--amber-bg:rgba(217,119,6,0.1);
      --red:#dc2626;--red-bg:rgba(220,38,38,0.1);
      --orange:#ea580c;--orange-bg:rgba(234,88,12,0.1);
      --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.1);
      --radius:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;touch-action:pan-x pan-y;-webkit-text-size-adjust:100%}
    body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
    .app{max-width:430px;margin:0 auto;padding:0 16px}
    .page-header{padding:calc(60px + env(safe-area-inset-top)) 0 20px;display:flex;justify-content:space-between;align-items:flex-end}
    .page-title{font-size:28px;font-weight:700;letter-spacing:-0.3px}
    .page-sub{font-size:12px;color:var(--text3);margin-top:2px}
    .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
    .card-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .card-value{font-size:24px;font-weight:700;letter-spacing:-0.3px}
    .card-note{font-size:10px;color:var(--text3);margin-top:2px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
    .tab-btn{padding:10px 14px;border:none;background:none;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
    .tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
    /* NAV — 6 items, no + */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg2);border-top:0.5px solid var(--border)}
    .nav-inner{display:flex;align-items:center;justify-content:space-around;max-width:430px;margin:0 auto;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 6px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:10px;transition:all .2s;font-family:'DM Sans',sans-serif;min-width:0;flex:1}
    .nav-item.active{color:var(--text)}
    .nav-item.active .nav-icon-wrap{background:var(--bg3)}
    .nav-icon-wrap{width:34px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .nav-item svg{width:18px;height:18px;stroke-width:1.7}
    .nav-label{font-size:9px;font-weight:600;white-space:nowrap}
    /* MODALS */
    .modal-overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
    .modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:92vh;overflow-y:auto;border-top:0.5px solid var(--border)}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;-webkit-appearance:none;-webkit-text-size-adjust:100%}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text);background:var(--bg2)}
    .field textarea{resize:none;height:72px;font-size:16px}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--text);color:#fff}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-outline{background:none;border:0.5px solid var(--border);color:var(--text)}
    .row-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f8f8f8}
    .row-item:last-child{border-bottom:none}
    .row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .row-name{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row-sub{font-size:11px;color:var(--text3);margin-top:1px}
    .row-del{width:28px;height:28px;border:none;background:none;color:var(--text3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s}
    .habit-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bg3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg2)}
    .habit-check.done{background:var(--green);border-color:var(--green)}
    .habit-check.done::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
    .bar-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px}
    .bar-fill{height:100%;border-radius:2px;transition:width .4s}
    .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
    .badge-red{background:var(--red-bg);color:var(--red)}
    .badge-amber{background:var(--amber-bg);color:var(--amber)}
    .badge-green{background:var(--green-bg);color:var(--green)}
    .badge-blue{background:var(--blue-bg);color:var(--blue)}
    .badge-purple{background:var(--purple-bg);color:var(--purple)}
    .spinner{width:28px;height:28px;border:3px solid var(--bg3);border-top-color:var(--text);border-radius:50%;animation:spin 1s linear infinite;margin:48px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:48px 16px;color:var(--text3)}
    .empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
    .empty p{font-size:13px}
    .pill{display:inline-block;font-size:11px;padding:4px 12px;border-radius:20px;background:var(--bg);color:var(--text2);border:0.5px solid var(--border);cursor:pointer;transition:all .2s;margin:2px 2px 2px 0}
    .pill.selected{background:var(--text);color:#fff;border-color:var(--text)}
    .stat-mini{text-align:center}
    .stat-mini .val{font-size:20px;font-weight:700}
    .stat-mini .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .week-day{display:flex;flex-direction:column;align-items:center;gap:3px}
    .week-day-lbl{font-size:10px;color:var(--text3)}
    .week-day-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text2)}
    .week-day-num.today{border:1.5px solid var(--blue);color:var(--blue);font-weight:700}
    .week-bar{width:28px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
    .week-bar-fill{height:100%;border-radius:2px;transition:width .4s}
    .week-pct{font-size:9px;color:var(--text3)}
    .trip-card{border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);cursor:pointer;position:relative;min-height:150px;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:10px}
    .trip-bg{position:absolute;inset:0;background:linear-gradient(135deg,#e8edf5,#f0f4fb)}
    .trip-bg img{width:100%;height:100%;object-fit:cover}
    .trip-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%,transparent 100%)}
    .trip-content{position:relative;z-index:2;padding:14px}
    .fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));right:16px;width:40px;height:40px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:30;transition:all .2s}
    .fab.spinning svg{animation:spin 1s linear infinite}
    .switch-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
    .switch-row span{font-size:14px;color:var(--text)}
    .switch{width:42px;height:24px;border-radius:12px;background:var(--bg3);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
    .switch.on{background:var(--green)}
    .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .switch.on::after{transform:translateX(18px)}
    .settings-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
    .settings-section h2{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
    .habit-cell{width:26px;height:26px;border-radius:7px;border:1px solid var(--bg3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .15s}
    .habit-cell.done{background:var(--green);border-color:var(--green)}
    .habit-cell.today-cell{border:1.5px solid var(--blue)}
    /* UNDO TOAST */
    .undo-toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2);min-width:240px;animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
    .undo-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans';white-space:nowrap}
    /* CALENDAR */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
    .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;position:relative;cursor:default}
    .cal-day.has-expense{background:var(--red-bg);color:var(--red);font-weight:600}
    .cal-day.today{border:1.5px solid var(--blue)}
    .cal-day.other-month{color:var(--text3)}
    /* MACRO EDIT */
    .macro-edit-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
    .macro-edit-row input{width:60px;padding:5px 8px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans';background:var(--bg);color:var(--text);outline:none;text-align:center}
    ::-webkit-scrollbar{width:0}
    .c-green{color:var(--green)}
    .c-red{color:var(--red)}
    .c-blue{color:var(--blue)}
  </style>
</head>
<body>
<div class="app">
  <div id="view-dashboard"></div>
  <div id="view-finances" style="display:none"></div>
  <div id="view-nutrition" style="display:none"></div>
  <div id="view-exercise" style="display:none"></div>
  <div id="view-habits" style="display:none"></div>
  <div id="view-tasks" style="display:none"></div>
  <div id="view-trips" style="display:none"></div>
  <div id="view-settings" style="display:none"></div>
</div>

<!-- MODALS -->
<div id="modal-expense" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-expense')">
  <div class="modal">
    <div class="modal-title">Nuevo gasto <button class="modal-close" onclick="closeModal('modal-expense')">×</button></div>
    <div class="field"><label>Cantidad (€)</label><input type="number" id="exp-amount" placeholder="0.00" step="0.01" inputmode="decimal"/></div>
    <div class="field"><label>Categoría</label><select id="exp-cat"></select></div>
    <div class="field"><label>Descripción</label><input type="text" id="exp-desc" placeholder="Opcional"/></div>
    <div class="field"><label>Fecha</label><input type="date" id="exp-date"/></div>
    <div class="field"><div class="switch-row"><span>Gasto recurrente mensual</span><button class="switch" id="exp-recurring" onclick="this.classList.toggle('on')"></button></div></div>
    <button class="btn btn-primary" onclick="saveExpense()">Registrar gasto</button>
  </div>
</div>

<div id="modal-income" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-income')">
  <div class="modal">
    <div class="modal-title">Nuevo ingreso <button class="modal-close" onclick="closeModal('modal-income')">×</button></div>
    <div class="field"><label>Cantidad (€)</label><input type="number" id="inc-amount" placeholder="0.00" step="0.01" inputmode="decimal"/></div>
    <div class="field"><label>Categoría</label><select id="inc-cat"></select></div>
    <div class="field"><label>Descripción</label><input type="text" id="inc-desc" placeholder="Opcional"/></div>
    <div class="field"><label>Fecha</label><input type="date" id="inc-date"/></div>
    <button class="btn btn-primary" onclick="saveIncome()">Registrar ingreso</button>
  </div>
</div>

<div id="modal-meal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-meal')">
  <div class="modal">
    <div class="modal-title">Registrar comida <button class="modal-close" onclick="closeModal('modal-meal')">×</button></div>
    <div class="field"><label>¿Qué has comido?</label><input type="text" id="meal-name" placeholder="Ej: 4 galletas príncipe, pollo 150g..."/></div>
    <div class="field"><label>Tipo</label>
      <select id="meal-type">
        <option value="breakfast">Desayuno</option><option value="lunch_am">Almuerzo</option>
        <option value="lunch">Comida</option><option value="snack_pm">Merienda</option>
        <option value="dinner">Cena</option><option value="snack">Snack</option>
      </select>
    </div>
    <div class="field"><label>Fecha</label><input type="date" id="meal-date"/></div>
    <p style="font-size:11px;color:var(--text3);margin-bottom:12px">La IA calculará las macros automáticamente</p>
    <button class="btn btn-primary" id="meal-submit-btn" onclick="saveMeal()">Registrar comida</button>
  </div>
</div>

<div id="modal-exercise" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-exercise')">
  <div class="modal">
    <div class="modal-title">Registrar ejercicio <button class="modal-close" onclick="closeModal('modal-exercise')">×</button></div>
    <div class="field"><label>Deporte</label>
      <select id="ex-type" onchange="updateExerciseFields()">
        <option value="gym">🏋️ Gimnasio</option><option value="running">🏃 Correr</option>
        <option value="walking">🚶 Andar</option><option value="cycling">🚴 Ciclismo</option>
        <option value="swimming">🏊 Natación</option><option value="yoga">🧘 Yoga</option><option value="other">⚡ Otro</option>
      </select>
    </div>
    <div class="field"><label>Duración (min)</label><input type="number" id="ex-duration" placeholder="45" inputmode="numeric"/></div>
    <div class="field"><label>Calorías quemadas</label><input type="number" id="ex-calories" placeholder="300" inputmode="numeric"/></div>
    <div id="ex-muscles-field" class="field"><label>Grupos musculares</label>
      <div style="margin-top:6px" id="ex-muscles">
        <span class="pill" onclick="togglePill(this)">Pecho</span><span class="pill" onclick="togglePill(this)">Espalda</span>
        <span class="pill" onclick="togglePill(this)">Hombros</span><span class="pill" onclick="togglePill(this)">Bíceps</span>
        <span class="pill" onclick="togglePill(this)">Tríceps</span><span class="pill" onclick="togglePill(this)">Piernas</span>
        <span class="pill" onclick="togglePill(this)">Glúteos</span><span class="pill" onclick="togglePill(this)">Core</span>
        <span class="pill" onclick="togglePill(this)">Cardio</span>
      </div>
    </div>
    <div id="ex-distance-field" class="field" style="display:none"><label>Distancia (km)</label><input type="number" id="ex-distance" step="0.1" placeholder="5.0" inputmode="decimal"/></div>
    <div id="ex-pace-field" class="field" style="display:none"><label>Ritmo (min/km)</label><input type="text" id="ex-pace" placeholder="6:30"/></div>
    <div class="field"><label>Fecha</label><input type="date" id="ex-date"/></div>
    <div class="field"><label>Notas</label><input type="text" id="ex-notes" placeholder="Opcional"/></div>
    <button class="btn btn-primary" onclick="saveExercise()">Registrar</button>
  </div>
</div>

<div id="modal-task" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-task')">
  <div class="modal">
    <div class="modal-title">Nueva tarea <button class="modal-close" onclick="closeModal('modal-task')">×</button></div>
    <div class="field"><label>Título</label><input type="text" id="task-title" placeholder="¿Qué necesitas hacer?"/></div>
    <div class="field"><label>Descripción</label><textarea id="task-desc" placeholder="Detalles opcionales..."></textarea></div>
    <div class="field"><label>Fecha límite</label><input type="date" id="task-due"/></div>
    <div class="field"><label>Prioridad</label>
      <select id="task-priority"><option value="low">Baja</option><option value="medium" selected>Media</option><option value="high">Alta</option></select>
    </div>
    <button class="btn btn-primary" onclick="saveTask()">Crear tarea</button>
  </div>
</div>

<div id="modal-habit" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-habit')">
  <div class="modal">
    <div class="modal-title">Nuevo hábito <button class="modal-close" onclick="closeModal('modal-habit')">×</button></div>
    <div class="field"><label>Nombre</label><input type="text" id="habit-name" placeholder="Ej: Meditar 10 minutos"/></div>
    <div class="field"><label>Emoji</label><input type="text" id="habit-icon" placeholder="✨" maxlength="2" style="width:56px"/></div>
    <button class="btn btn-primary" onclick="saveHabit()">Crear hábito</button>
  </div>
</div>

<div id="modal-trip" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-trip')">
  <div class="modal">
    <div class="modal-title"><span id="trip-modal-title">Nuevo viaje</span><button class="modal-close" onclick="closeModal('modal-trip')">×</button></div>
    <div class="field"><label>Destino</label><input type="text" id="trip-dest" placeholder="París, Tokio..."/></div>
    <div class="field"><label>Frase resumen</label><input type="text" id="trip-summary" placeholder="El viaje que cambió mi perspectiva..."/></div>
    <div class="grid2" style="gap:10px">
      <div class="field"><label>Inicio</label><input type="date" id="trip-start"/></div>
      <div class="field"><label>Fin</label><input type="date" id="trip-end"/></div>
    </div>
    <div class="field"><label>Tipo</label><select id="trip-type"><option value="leisure">🌴 Ocio</option><option value="work">💼 Trabajo</option></select></div>
    <div class="field"><label>Estado</label>
      <select id="trip-status"><option value="planning">Planificando</option><option value="upcoming">Próximo</option><option value="ongoing">En curso</option><option value="completed">Completado</option></select>
    </div>
    <div class="field"><label>URL foto de portada</label><input type="text" id="trip-photo" placeholder="https://...jpg"/></div>
    <div class="field"><label>Notas</label><textarea id="trip-notes" placeholder="Hoteles, actividades..."></textarea></div>
    <button class="btn btn-primary" onclick="saveTrip()">Guardar viaje</button>
  </div>
</div>

<!-- CALENDAR MODAL -->
<div id="modal-calendar" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-calendar')">
  <div class="modal">
    <div class="modal-title">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="calPrevMonth()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2)">‹</button>
        <span id="cal-title" style="font-size:15px"></span>
        <button onclick="calNextMonth()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2)">›</button>
      </div>

<script>
const SUPABASE_URL='https://wargnwocgnouaubjpxrj.supabase.co';

// ─── DB ──────────────────────────────────────────────────────────────────────
const db={
  async get(table,params={}){
    let url=`${SUPABASE_URL}/rest/v1/${table}?select=*`;
    if(params.filter)Object.entries(params.filter).forEach(([k,v])=>url+=`&${k}=eq.${encodeURIComponent(v)}`);
    if(params.gte)Object.entries(params.gte).forEach(([k,v])=>url+=`&${k}=gte.${encodeURIComponent(v)}`);
    if(params.lte)Object.entries(params.lte).forEach(([k,v])=>url+=`&${k}=lte.${encodeURIComponent(v)}`);
    if(params.order)url+=`&order=${params.order}`;
    if(params.limit)url+=`&limit=${params.limit}`;
    const r=await fetch(url,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
    return r.json();
  },
  async insert(table,data){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(data)});
    const res=await r.json();return Array.isArray(res)?res[0]:res;
  },
  async update(table,id,data){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(data)});
    const res=await r.json();return Array.isArray(res)?res[0]:res;
  },
  async delete(table,id){
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});

};

// ─── UTILS ───────────────────────────────────────────────────────────────────
const fmt=n=>(n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:2});
function getBillingPeriod(d=1){
  const now=new Date();const day=now.getDate();const pad=n=>String(n).padStart(2,'0');
  let s,e;
  if(day>=d){s=new Date(now.getFullYear(),now.getMonth(),d);e=new Date(now.getFullYear(),now.getMonth()+1,d-1);}
  else{s=new Date(now.getFullYear(),now.getMonth()-1,d);e=new Date(now.getFullYear(),now.getMonth(),d-1);}
  const f=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  return{start:f(s),end:f(e),label:`${s.getDate()}/${pad(s.getMonth()+1)} — ${e.getDate()}/${pad(e.getMonth()+1)}`};
}
function getWeekDays(){
  const hoy=new Date();const dia=hoy.getDay();const diff=dia===0?-6:1-dia;
  const l=new Date(hoy);l.setDate(hoy.getDate()+diff);
  return Array.from({length:7},(_,i)=>{const d=new Date(l);d.setDate(l.getDate()+i);return d.toISOString().split('T')[0];});
}
function getLast14Days(){
  return Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));return d.toISOString().split('T')[0];});
}
function getExpenseCats(){return[...(S.settings?.custom_expense_cats||[]),...DEFAULT_EXPENSE_CATS.filter(c=>!(S.settings?.removed_expense_cats||[]).includes(c))];}
function getIncomeCats(){return[...(S.settings?.custom_income_cats||[]),...DEFAULT_INCOME_CATS.filter(c=>!(S.settings?.removed_income_cats||[]).includes(c))];}

      <button onclick="switchPage('settings')" style="width:36px;height:36px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

        <div class="habit-check ${done?'done':''}" id="hd-${h.id}"></div>

      </div>`;}).join('')}
    </div>`:''}
    <div class="card" style="margin-bottom:10px">
      <div class="card-label">Tareas pendientes</div>
      ${tasks.length===0?'<p style="font-size:13px;color:var(--text3);text-align:center;padding:6px 0">¡Sin tareas pendientes! 🎉</p>':

  else{const n=await db.insert('habit_logs',{habit_id:habitId,date:today,completed:true});S.habitLogs.push(n);}
  const hd=document.getElementById(`hd-${habitId}`);if(hd)hd.classList.toggle('done',!ex);
}

async function toggleTaskDash(id){

  const taskEl=document.querySelector(`[onclick="toggleTaskDash('${id}')"]`)?.closest('div[style]');
  if(taskEl){taskEl.style.opacity='0';taskEl.style.transition='opacity .3s';setTimeout(()=>renderDashboard(),300);}
}

async function delTx(id,name){
  const tx=S.transactions.find(t=>t.id===id);
  S.transactions=S.transactions.filter(t=>t.id!==id);
  await db.delete('transactions',id);
  renderFinances();
  showUndo(`"${name}" eliminado`,async()=>{
    if(tx){await db.insert('transactions',{type:tx.type,amount:tx.amount,category:tx.category,description:tx.description,date:tx.date,is_recurring:tx.is_recurring});S.transactions=[];renderFinances();}
  });
}

async function toggleRecurring(id){
  await db.update('transactions',id,{is_recurring:false});
  S.transactions=S.transactions.map(t=>t.id===id?{...t,is_recurring:false}:t);
  renderFinances();
}

// Calendar
function openCalendar(){S.calYear=new Date().getFullYear();S.calMonth=new Date().getMonth();renderCalendar();openModal('modal-calendar');}
function calPrevMonth(){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}renderCalendar();}
function calNextMonth(){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}renderCalendar();}
function renderCalendar(){
  const recurring=S.transactions.filter(t=>t.is_recurring&&t.type==='expense');
  const y=S.calYear,m=S.calMonth;
  const pad=n=>String(n).padStart(2,'0');
  const firstDay=new Date(y,m,1).getDay();const daysInMonth=new Date(y,m+1,0).getDate();
  const startOffset=firstDay===0?6:firstDay-1;
  document.getElementById('cal-title').textContent=`${MESES[m].charAt(0).toUpperCase()+MESES[m].slice(1)} ${y}`;
  let html=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">${['L','M','X','J','V','S','D'].map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:4px">${d}</div>`).join('')}</div>`;
  html+=`<div class="cal-grid">`;
  for(let i=0;i<startOffset;i++)html+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${pad(m+1)}-${pad(d)}`;
    const isToday=dateStr===today;
    const dayRecurring=recurring.filter(t=>new Date(t.date+'T12:00:00').getDate()===d);
    const hasExp=dayRecurring.length>0;
    const tooltip=dayRecurring.map(t=>`${t.description||t.category}: ${(t.amount||0).toFixed(2)}€`).join(', ');
    html+=`<div class="cal-day ${hasExp?'has-expense':''} ${isToday?'today':''}" title="${tooltip}">${d}${hasExp?`<div style="font-size:7px;margin-top:1px">${dayRecurring.reduce((a,t)=>a+(t.amount||0),0).toFixed(0)}€</div>`:''}</div>`;
  }
  html+='</div>';
  if(recurring.length>0){
    html+=`<div style="margin-top:16px"><p style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:8px">Este mes</p>`;
    const monthTotal=recurring.reduce((a,t)=>a+(t.amount||0),0);
    html+=`<p style="font-size:13px;color:var(--text2);margin-bottom:8px">Total fijos: <strong style="color:var(--red)">${fmt(monthTotal)}</strong></p>`;
    html+=recurring.map(t=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f8f8f8;font-size:13px">
      <span>${t.description||t.category}</span><span style="font-weight:600;color:var(--red)">Día ${new Date(t.date+'T12:00:00').getDate()} · -${(t.amount||0).toFixed(2)}€</span>
    </div>`).join('');
    html+='</div>';
  }
  document.getElementById('cal-content').innerHTML=html;
}

            return`<div style="display:flex;justify-content:center">

async function toggleHabitLog(habitId,date){
  const ex=S.habitLogs.find(l=>l.habit_id===habitId&&l.date===date);
  if(ex){await db.delete('habit_logs',ex.id);S.habitLogs=S.habitLogs.filter(l=>l.id!==ex.id);}
  else{const n=await db.insert('habit_logs',{habit_id:habitId,date,completed:true});S.habitLogs.push(n);}
  renderHabits();
}
async function delHabit(id){

async function addCat(type){
  const inputId=type==='expense'?'new-exp-cat':'new-inc-cat';
  const val=document.getElementById(inputId).value.trim();
  if(!val)return;
  const key=type==='expense'?'custom_expense_cats':'custom_income_cats';
  const current=S.settings?.[key]||[];
  const updated=[...current,val];
  if(S.settings?.id)await db.update('user_settings',S.settings.id,{[key]:updated});
  if(S.settings)S.settings[key]=updated;
  document.getElementById(inputId).value='';
  renderSettings();
}
async function removeCat(type,cat){
  const customKey=type==='expense'?'custom_expense_cats':'custom_income_cats';
  const removedKey=type==='expense'?'removed_expense_cats':'removed_income_cats';
  const defaults=type==='expense'?DEFAULT_EXPENSE_CATS:DEFAULT_INCOME_CATS;
  let payload={};
  if(defaults.includes(cat)){
    const removed=[...(S.settings?.[removedKey]||[]),cat];
    payload[removedKey]=removed;
  } else {
    const custom=(S.settings?.[customKey]||[]).filter(c=>c!==cat);
    payload[customKey]=custom;
  }
  if(S.settings?.id)await db.update('user_settings',S.settings.id,payload);
  if(S.settings)Object.assign(S.settings,payload);
  renderSettings();
}

  const btn=document.getElementById('meal-submit-btn');

    billing_day:parseInt(document.getElementById('s-billing').value)||1,
    daily_calorie_goal:parseInt(document.getElementById('s-calories').value)||2000,
    monthly_salary:salary,payday,
    custom_expense_cats:S.settings?.custom_expense_cats||[],
    custom_income_cats:S.settings?.custom_income_cats||[],
    removed_expense_cats:S.settings?.removed_expense_cats||[],
    removed_income_cats:S.settings?.removed_income_cats||[]
  };
  if(S.settings?.id)await db.update('user_settings',S.settings.id,payload);
  else await db.insert('user_settings',payload);
  // Auto-add salary if configured
  if(salary&&salary>0){
    const now=new Date();const pad=n=>String(n).padStart(2,'0');
    const salaryDate=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(payday)}`;
    const alreadyAdded=S.transactions.find(t=>t.date===salaryDate&&t.category==='Salario'&&t.is_recurring);
    if(!alreadyAdded){
      await db.insert('transactions',{type:'income',amount:salary,category:'Salario',description:'Sueldo mensual',date:salaryDate,is_recurring:true});
      S.transactions=[];
    }
  }
  S.settings=null;
  const btn=document.getElementById('save-settings-btn');
  if(btn){btn.textContent='✓ Guardado';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='Guardar ajustes';btn.style.background='';},2000);}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function openModal(id){
  document.getElementById(id).style.display='flex';
  document.querySelectorAll(`#${id} input[type="date"]`).forEach(i=>{if(!i.value)i.value=today;});
  if(id==='modal-calendar')openCalendar();
}
function closeModal(id){document.getElementById(id).style.display='none';}
function togglePill(el){el.classList.toggle('selected');}
function updateExerciseFields(){
  const s=document.getElementById('ex-type').value;
  document.getElementById('ex-muscles-field').style.display=s==='gym'?'block':'none';
  document.getElementById('ex-distance-field').style.display=['running','cycling','walking'].includes(s)?'block':'none';
  document.getElementById('ex-pace-field').style.display=['running','walking'].includes(s)?'block':'none';
}
function openCalendar(){
  S.calYear=new Date().getFullYear();S.calMonth=new Date().getMonth();
  renderCalendar();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
// Add missing columns to user_settings if needed
async function ensureSettingsColumns(){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/user_settings?select=monthly_salary,payday,custom_expense_cats,custom_income_cats,removed_expense_cats,removed_income_cats&limit=1`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
  }catch(e){}
}
ensureSettingsColumns();
renderDashboard();
</script>
