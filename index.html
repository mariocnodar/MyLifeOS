<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Nexus OS"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>Nexus OS</title>
  <link rel="apple-touch-icon" href="/icon.png"/>
  <link rel="icon" type="image/png" href="/icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f5f7;
      --bg2: #ffffff;
      --bg3: #ebebed;
      --border: rgba(0,0,0,0.08);
      --text: #0a0a0a;
      --text2: #666;
      --text3: #aaa;
      --green: #1a9e6e;
      --green-bg: rgba(26,158,110,0.1);
      --blue: #2563eb;
      --blue-bg: rgba(37,99,235,0.1);
      --amber: #d97706;
      --amber-bg: rgba(217,119,6,0.1);
      --red: #dc2626;
      --red-bg: rgba(220,38,38,0.1);
      --orange: #ea580c;
      --orange-bg: rgba(234,88,12,0.1);
      --purple: #7c3aed;
      --purple-bg: rgba(124,58,237,0.1);
      --radius: 16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
    .app{max-width:430px;margin:0 auto;padding:0 16px}

    /* HEADER */
    .page-header{padding:calc(48px + env(safe-area-inset-top)) 0 20px;display:flex;justify-content:space-between;align-items:flex-end}
    .page-title{font-size:28px;font-weight:700;letter-spacing:-0.3px}
    .page-sub{font-size:12px;color:var(--text3);margin-top:2px}

    /* CARDS */
    .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
    .card-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .card-value{font-size:24px;font-weight:700;letter-spacing:-0.3px}
    .card-note{font-size:10px;color:var(--text3);margin-top:2px}

    /* GRID */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

    /* TABS */
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
    .tab-btn{padding:10px 16px;border:none;background:none;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
    .tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg2);border-top:0.5px solid var(--border)}
    .nav-inner{display:flex;align-items:center;justify-content:space-around;max-width:430px;margin:0 auto;padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 8px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:10px;transition:all .2s;font-family:'DM Sans',sans-serif}
    .nav-item.active{color:var(--text)}
    .nav-item svg{width:20px;height:20px;stroke-width:1.7}
    .nav-label{font-size:9px;font-weight:600}
    .nav-plus{width:46px;height:46px;border-radius:50%;background:var(--text);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
    .nav-plus svg{width:22px;height:22px;color:#fff;stroke-width:2.5;transition:transform .3s}
    .nav-plus.open svg{transform:rotate(45deg)}

    /* QUICK ADD OVERLAY */
    .overlay{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.3);backdrop-filter:blur(2px)}
    .overlay-card{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(80px + env(safe-area-inset-bottom));border-top:0.5px solid var(--border)}
    .overlay-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:14px}
    .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .quick-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 8px;background:var(--bg);border-radius:14px;border:none;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
    .quick-btn:active{transform:scale(.95);background:var(--bg3)}
    .quick-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .quick-label{font-size:11px;font-weight:500;color:var(--text)}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
    .modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;border-top:0.5px solid var(--border)}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;-webkit-appearance:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text);background:var(--bg2)}
    .field textarea{resize:none;height:72px}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--text);color:#fff}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-outline{background:none;border:0.5px solid var(--border);color:var(--text)}

    /* ROW ITEMS */
    .row-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f8f8f8}
    .row-item:last-child{border-bottom:none}
    .row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .row-name{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row-sub{font-size:11px;color:var(--text3);margin-top:1px}
    .row-del{width:28px;height:28px;border:none;background:none;color:var(--text3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s}
    .row-del:hover{background:var(--red-bg);color:var(--red)}

    /* HABIT CHECK */
    .habit-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bg3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg2)}
    .habit-check.done{background:var(--green);border-color:var(--green)}
    .habit-check.done::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}

    /* PROGRESS BAR */
    .bar-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px}
    .bar-fill{height:100%;border-radius:2px;transition:width .4s}

    /* BADGES */
    .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
    .badge-red{background:var(--red-bg);color:var(--red)}
    .badge-amber{background:var(--amber-bg);color:var(--amber)}
    .badge-green{background:var(--green-bg);color:var(--green)}
    .badge-blue{background:var(--blue-bg);color:var(--blue)}
    .badge-purple{background:var(--purple-bg);color:var(--purple)}

    /* LOADING */
    .spinner{width:28px;height:28px;border:3px solid var(--bg3);border-top-color:var(--text);border-radius:50%;animation:spin 1s linear infinite;margin:48px auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* EMPTY */
    .empty{text-align:center;padding:48px 16px;color:var(--text3)}
    .empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
    .empty p{font-size:13px}

    /* PILL TAGS */
    .pill{display:inline-block;font-size:11px;padding:4px 12px;border-radius:20px;background:var(--bg);color:var(--text2);border:0.5px solid var(--border);cursor:pointer;transition:all .2s;margin:2px 2px 2px 0}
    .pill.selected{background:var(--text);color:#fff;border-color:var(--text)}

    /* STAT MINI */
    .stat-mini{text-align:center}
    .stat-mini .val{font-size:20px;font-weight:700}
    .stat-mini .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

    /* WEEKLY GRID */
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .week-day{display:flex;flex-direction:column;align-items:center;gap:3px}
    .week-day-lbl{font-size:10px;color:var(--text3)}
    .week-day-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text2)}
    .week-day-num.today{border:1.5px solid var(--blue);color:var(--blue);font-weight:700}
    .week-bar{width:28px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
    .week-bar-fill{height:100%;border-radius:2px;transition:width .4s}
    .week-pct{font-size:9px;color:var(--text3)}

    /* TRIP CARD */
    .trip-card{border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);cursor:pointer;position:relative;min-height:140px;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:10px;transition:all .2s}
    .trip-card:active{transform:scale(.99)}
    .trip-bg{position:absolute;inset:0;background:linear-gradient(135deg,#e8edf5,#f0f4fb)}
    .trip-bg img{width:100%;height:100%;object-fit:cover}
    .trip-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 60%,transparent 100%)}
    .trip-content{position:relative;z-index:2;padding:14px}

    /* FAB REFRESH */
    .fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));right:16px;width:40px;height:40px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:30;transition:all .2s}
    .fab:hover{color:var(--text)}
    .fab.spinning svg{animation:spin 1s linear infinite}

    /* SWITCH */
    .switch-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
    .switch-row span{font-size:14px;color:var(--text)}
    .switch{width:42px;height:24px;border-radius:12px;background:var(--bg3);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
    .switch.on{background:var(--green)}
    .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .switch.on::after{transform:translateX(18px)}

    /* SECTION LABEL */
    .section-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px}

    /* FINANCE COLORS */
    .c-green{color:var(--green)}
    .c-red{color:var(--red)}
    .c-blue{color:var(--blue)}
    .c-amber{color:var(--amber)}

    /* SCROLL */
    ::-webkit-scrollbar{width:0}

    /* SETTINGS SECTION */
    .settings-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
    .settings-section h2{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}

    /* HABIT TABLE */
    .habit-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .habit-table{border-collapse:collapse;width:100%}
    .habit-table th{padding:4px 6px;font-size:10px;color:var(--text3);font-weight:500;text-align:center;white-space:nowrap}
    .habit-table th:first-child{text-align:left;padding-left:0;min-width:110px}
    .habit-table td{padding:4px 6px;text-align:center;border-bottom:1px solid #f8f8f8}
    .habit-table td:first-child{text-align:left;padding-left:0}
    .habit-table tr:last-child td{border-bottom:none}
    .habit-cell{width:26px;height:26px;border-radius:7px;border:1px solid var(--bg3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .15s}
    .habit-cell.done{background:var(--green);border-color:var(--green)}
    .habit-cell.today-cell{border:1.5px solid var(--blue)}
  </style>
</head>
<body>
<div class="app" id="app">
  <div id="view-dashboard"></div>
  <div id="view-finances" style="display:none"></div>
  <div id="view-nutrition" style="display:none"></div>
  <div id="view-exercise" style="display:none"></div>
  <div id="view-habits" style="display:none"></div>
  <div id="view-tasks" style="display:none"></div>
  <div id="view-trips" style="display:none"></div>
  <div id="view-settings" style="display:none"></div>
</div>

<!-- Quick add overlay -->
<div id="quick-overlay" style="display:none" onclick="if(event.target.id==='quick-overlay')closeQuick()">
  <div class="overlay" onclick="closeQuick()"></div>
  <div class="overlay-card">
    <p class="overlay-title">¿Qué quieres registrar?</p>
    <div class="quick-grid">
      <button class="quick-btn" onclick="closeQuick();openModal('modal-expense')">
        <div class="quick-icon" style="background:var(--red-bg)">💸</div>
        <span class="quick-label">Gasto</span>
      </button>
      <button class="quick-btn" onclick="closeQuick();openModal('modal-income')">
        <div class="quick-icon" style="background:var(--green-bg)">💰</div>
        <span class="quick-label">Ingreso</span>
      </button>
      <button class="quick-btn" onclick="closeQuick();openModal('modal-meal')">
        <div class="quick-icon" style="background:var(--amber-bg)">🍽️</div>
        <span class="quick-label">Comida</span>
      </button>
      <button class="quick-btn" onclick="closeQuick();openModal('modal-exercise')">
        <div class="quick-icon" style="background:var(--orange-bg)">💪</div>
        <span class="quick-label">Ejercicio</span>
      </button>
      <button class="quick-btn" onclick="closeQuick();openModal('modal-task')">
        <div class="quick-icon" style="background:var(--purple-bg)">✅</div>
        <span class="quick-label">Tarea</span>
      </button>
      <button class="quick-btn" onclick="closeQuick();openModal('modal-trip')">
        <div class="quick-icon" style="background:var(--blue-bg)">✈️</div>
        <span class="quick-label">Viaje</span>
      </button>
    </div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-expense" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-expense')">
  <div class="modal">
    <div class="modal-title">Nuevo gasto <button class="modal-close" onclick="closeModal('modal-expense')">×</button></div>
    <div class="field"><label>Cantidad (€)</label><input type="number" id="exp-amount" placeholder="0.00" step="0.01"/></div>
    <div class="field"><label>Categoría</label>
      <select id="exp-cat">
        <option value="Alimentación">Alimentación</option>
        <option value="Transporte">Transporte</option>
        <option value="Vivienda">Vivienda</option>
        <option value="Ocio">Ocio</option>
        <option value="Salud">Salud</option>
        <option value="Ropa">Ropa</option>
        <option value="Suscripciones">Suscripciones</option>
        <option value="Educación">Educación</option>
        <option value="Ahorro / Inversión">Ahorro / Inversión</option>
        <option value="Otros">Otros</option>
      </select>
    </div>
    <div class="field"><label>Descripción</label><input type="text" id="exp-desc" placeholder="Opcional"/></div>
    <div class="field"><label>Fecha</label><input type="date" id="exp-date"/></div>
    <div class="field">
      <div class="switch-row"><span>Gasto recurrente mensual</span><button class="switch" id="exp-recurring" onclick="this.classList.toggle('on')"></button></div>
    </div>
    <button class="btn btn-primary" onclick="saveExpense()">Registrar gasto</button>
  </div>
</div>

<div id="modal-income" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-income')">
  <div class="modal">
    <div class="modal-title">Nuevo ingreso <button class="modal-close" onclick="closeModal('modal-income')">×</button></div>
    <div class="field"><label>Cantidad (€)</label><input type="number" id="inc-amount" placeholder="0.00" step="0.01"/></div>
    <div class="field"><label>Categoría</label>
      <select id="inc-cat">
        <option value="Salario">Salario</option>
        <option value="Freelance">Freelance</option>
        <option value="Inversiones">Inversiones</option>
        <option value="Otros">Otros</option>
      </select>
    </div>
    <div class="field"><label>Descripción</label><input type="text" id="inc-desc" placeholder="Opcional"/></div>
    <div class="field"><label>Fecha</label><input type="date" id="inc-date"/></div>
    <button class="btn btn-primary" onclick="saveIncome()">Registrar ingreso</button>
  </div>
</div>

<div id="modal-meal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-meal')">
  <div class="modal">
    <div class="modal-title">Registrar comida <button class="modal-close" onclick="closeModal('modal-meal')">×</button></div>
    <div class="field"><label>¿Qué has comido?</label><input type="text" id="meal-name" placeholder="Ej: 4 galletas príncipe, pollo 150g..."/></div>
    <div class="field"><label>Tipo</label>
      <select id="meal-type">
        <option value="breakfast">Desayuno</option>
        <option value="lunch_am">Almuerzo</option>
        <option value="lunch">Comida</option>
        <option value="snack_pm">Merienda</option>
        <option value="dinner">Cena</option>
        <option value="snack">Snack</option>
      </select>
    </div>
    <div class="field"><label>Fecha</label><input type="date" id="meal-date"/></div>
    <p style="font-size:11px;color:var(--text3);margin-bottom:12px">Las macros se calculan automáticamente</p>
    <button class="btn btn-primary" id="meal-submit-btn" onclick="saveMeal()">Registrar comida</button>
  </div>
</div>

<div id="modal-exercise" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-exercise')">
  <div class="modal">
    <div class="modal-title">Registrar ejercicio <button class="modal-close" onclick="closeModal('modal-exercise')">×</button></div>
    <div class="field"><label>Deporte</label>
      <select id="ex-type" onchange="updateExerciseFields()">
        <option value="gym">🏋️ Gimnasio</option>
        <option value="running">🏃 Correr</option>
        <option value="walking">🚶 Andar</option>
        <option value="cycling">🚴 Ciclismo</option>
        <option value="swimming">🏊 Natación</option>
        <option value="yoga">🧘 Yoga</option>
        <option value="other">⚡ Otro</option>
      </select>
    </div>
    <div class="field"><label>Duración (min)</label><input type="number" id="ex-duration" placeholder="45"/></div>
    <div class="field"><label>Calorías quemadas</label><input type="number" id="ex-calories" placeholder="300"/></div>
    <div id="ex-muscles-field" class="field">
      <label>Grupos musculares</label>
      <div style="margin-top:6px" id="ex-muscles">
        <span class="pill" onclick="togglePill(this)">Pecho</span><span class="pill" onclick="togglePill(this)">Espalda</span>
        <span class="pill" onclick="togglePill(this)">Hombros</span><span class="pill" onclick="togglePill(this)">Bíceps</span>
        <span class="pill" onclick="togglePill(this)">Tríceps</span><span class="pill" onclick="togglePill(this)">Piernas</span>
        <span class="pill" onclick="togglePill(this)">Glúteos</span><span class="pill" onclick="togglePill(this)">Core</span>
        <span class="pill" onclick="togglePill(this)">Cardio</span>
      </div>
    </div>
    <div id="ex-distance-field" class="field" style="display:none"><label>Distancia (km)</label><input type="number" id="ex-distance" step="0.1" placeholder="5.0"/></div>
    <div id="ex-pace-field" class="field" style="display:none"><label>Ritmo (min/km)</label><input type="text" id="ex-pace" placeholder="6:30"/></div>
    <div class="field"><label>Fecha</label><input type="date" id="ex-date"/></div>
    <div class="field"><label>Notas</label><input type="text" id="ex-notes" placeholder="Opcional"/></div>
    <button class="btn btn-primary" onclick="saveExercise()">Registrar</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wargnwocgnouaubjpxrj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qY6VY1vfGXMVxg1IQ0rnIw_Qfg5VUWl';
const today = new Date().toISOString().split('T')[0];
const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ─── DB ─────────────────────────────────────────────────────────────────────
const db = {
  async get(table, params={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
    if (params.filter) Object.entries(params.filter).forEach(([k,v]) => url += `&${k}=eq.${encodeURIComponent(v)}`);
    if (params.gte) Object.entries(params.gte).forEach(([k,v]) => url += `&${k}=gte.${encodeURIComponent(v)}`);
    if (params.lte) Object.entries(params.lte).forEach(([k,v]) => url += `&${k}=lte.${encodeURIComponent(v)}`);
    if (params.order) url += `&order=${params.order}`;
    if (params.limit) url += `&limit=${params.limit}`;
    const r = await fetch(url, { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } });
    return r.json();
  },
  async insert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation' },
      body: JSON.stringify(data)
    });
    const res = await r.json(); return Array.isArray(res)?res[0]:res;
  },
  async update(table, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'PATCH', headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation' },
      body: JSON.stringify(data)
    });
    const res = await r.json(); return Array.isArray(res)?res[0]:res;
  },
  async delete(table, id) {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'DELETE', headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
    });
  }
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = {
  page:'dashboard', tasks:[], transactions:[], habits:[], habitLogs:[],
  meals:[], exercises:[], trips:[], settings:null,

  nutritionDate:today
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
const fmt = n => (n||0).toLocaleString('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:2});
function getBillingPeriod(billingDay=1) {
  const now=new Date(); const day=now.getDate();
  const pad=n=>String(n).padStart(2,'0');
  let s,e;
  if (day>=billingDay) {
    s=new Date(now.getFullYear(),now.getMonth(),billingDay);
    e=new Date(now.getFullYear(),now.getMonth()+1,billingDay-1);
  } else {
    s=new Date(now.getFullYear(),now.getMonth()-1,billingDay);
    e=new Date(now.getFullYear(),now.getMonth(),billingDay-1);
  }
  const f=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  return { start:f(s), end:f(e), label:`${s.getDate()}/${pad(s.getMonth()+1)} — ${e.getDate()}/${pad(e.getMonth()+1)}` };
}
function getWeekDays() {
  const hoy=new Date(); const dia=hoy.getDay();
  const diff=dia===0?-6:1-dia;
  const l=new Date(hoy); l.setDate(hoy.getDate()+diff);
  return Array.from({length:7},(_,i)=>{ const d=new Date(l); d.setDate(l.getDate()+i); return d.toISOString().split('T')[0]; });
}
function getLast14Days() {
  return Array.from({length:14},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(13-i)); return d.toISOString().split('T')[0]; });
}

  S.page=page;
  renderPage(page);
}

  const fn={dashboard:renderDashboard,finances:renderFinances,nutrition:renderNutrition,exercise:renderExercise,habits:renderHabits,tasks:renderTasks,trips:renderTrips,settings:renderSettings};
  if(fn[p]) await fn[p]();
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
async function renderDashboard() {
  const el=document.getElementById('view-dashboard');
  el.innerHTML='<div class="spinner"></div>';
  const d=new Date();
  const todayStr=`${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
  const [tasks,txs,meals,settings,habits,habitLogs]=await Promise.all([
    db.get('tasks',{filter:{completed:false},order:'created_at.desc',limit:50}),
    db.get('transactions',{order:'date.desc',limit:500}),
    db.get('meals',{filter:{date:today}}),
    db.get('user_settings',{order:'created_at.desc',limit:1}),
    db.get('habits',{filter:{is_active:true}}),
    db.get('habit_logs',{filter:{date:today}}),
  ]);
  S.tasks=tasks; S.transactions=txs; S.meals=meals;
  S.settings=settings[0]||{daily_calorie_goal:2000,billing_day:1};
  S.habits=habits; S.habitLogs=habitLogs;
  const period=getBillingPeriod(S.settings.billing_day||1);
  const periodTxs=txs.filter(t=>t.date>=period.start&&t.date<=period.end);
  const income=periodTxs.filter(t=>t.type==='income').reduce((a,t)=>a+(t.amount||0),0);
  const savings=periodTxs.filter(t=>t.type==='expense'&&t.category==='Ahorro / Inversión').reduce((a,t)=>a+(t.amount||0),0);
  const expenses=periodTxs.filter(t=>t.type==='expense'&&t.category!=='Ahorro / Inversión').reduce((a,t)=>a+(t.amount||0),0);
  const available=income-expenses-savings;
  const todayCals=meals.reduce((a,m)=>a+(m.calories||0),0);
  const calGoal=S.settings.daily_calorie_goal||2000;
  const calPct=Math.min(100,Math.round(todayCals/calGoal*100));
  const completedH=habits.filter(h=>habitLogs.some(l=>l.habit_id===h.id)).length;
  const weekDays=getWeekDays(); const dayLetters=['L','M','X','J','V','S','D'];

    <div class="card" style="margin-bottom:10px">

        ${weekDays.map((day,i)=>{
          const isToday=day===today;
          const dayLogs=habitLogs.filter(l=>l.date===day);
          const comp=habits.filter(h=>dayLogs.some(l=>l.habit_id===h.id)).length;
          const total=habits.length; const pct=total>0?comp/total:0;
          const color=pct>=1?'var(--green)':pct>=.5?'var(--blue)':pct>0?'var(--amber)':'var(--bg3)';

            <span class="week-pct">${comp}/${total}</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  el.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">Nexus OS</h1><p class="page-sub">${todayStr}</p></div>
      <button onclick="switchPage('settings')" style="width:36px;height:36px;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- Hábitos -->
    ${habits.length>0?`<div class="card" style="margin-bottom:10px">
      <div class="card-label" style="display:flex;justify-content:space-between">Hábitos de hoy <span style="color:var(--green)">${completedH}/${habits.length}</span></div>
      ${habits.map(h=>{
        const done=habitLogs.some(l=>l.habit_id===h.id);
        return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f8f8f8;cursor:pointer" onclick="toggleHabitDash('${h.id}')">

          <span style="font-size:14px">${h.icon||'✨'}</span>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- Tareas pendientes -->
    <div class="card" style="margin-bottom:10px">
      <div class="card-label">Tareas pendientes</div>
      ${tasks.length===0?'<p style="font-size:13px;color:var(--text3);text-align:center;padding:6px 0">¡Sin tareas pendientes! 🎉</p>':
        tasks.slice(0,3).map(t=>`
          <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f8f8f8">
            <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${t.priority==='high'?'var(--red)':t.priority==='medium'?'var(--amber)':'var(--text3)'}"></div>

        (tasks.length>3?`<p style="font-size:11px;color:var(--text3);margin-top:8px">+${tasks.length-3} más</p>`:'')}
    </div>

    <!-- Finanzas + Calorías -->

      <div class="card">

        <span style="font-size:10px;color:var(--text3)">${calGoal}</span>
      </div>
    </div>

    ${weeklyHtml}

    <!-- Accesos rápidos -->

async function toggleHabitDash(habitId) {
  const existing=S.habitLogs.find(l=>l.habit_id===habitId&&l.date===today);
  if(existing){await db.delete('habit_logs',existing.id);S.habitLogs=S.habitLogs.filter(l=>l.id!==existing.id);}
  else{const n=await db.insert('habit_logs',{habit_id:habitId,date:today,completed:true});S.habitLogs.push(n);}
  const hd=document.getElementById(`hd-${habitId}`);
  if(hd) hd.classList.toggle('done',!existing);
}

// ─── FINANCES ────────────────────────────────────────────────────────────────
async function renderFinances() {
  const el=document.getElementById('view-finances');
  el.innerHTML='<div class="spinner"></div>';
  if(!S.transactions.length) S.transactions=await db.get('transactions',{order:'date.desc',limit:500});
  if(!S.settings){const s=await db.get('user_settings',{order:'created_at.desc',limit:1});S.settings=s[0]||{billing_day:1};}
  const period=getBillingPeriod(S.settings?.billing_day||1);
  const ptxs=S.transactions.filter(t=>t.date>=period.start&&t.date<=period.end);
  const income=ptxs.filter(t=>t.type==='income').reduce((a,t)=>a+(t.amount||0),0);
  const savings=ptxs.filter(t=>t.type==='expense'&&t.category==='Ahorro / Inversión').reduce((a,t)=>a+(t.amount||0),0);
  const expenses=ptxs.filter(t=>t.type==='expense'&&t.category!=='Ahorro / Inversión').reduce((a,t)=>a+(t.amount||0),0);
  const fixed=ptxs.filter(t=>t.type==='expense'&&t.is_recurring&&t.category!=='Ahorro / Inversión').reduce((a,t)=>a+(t.amount||0),0);
  const available=income-expenses-savings;
  const byCat={};
  ptxs.filter(t=>t.type==='expense').forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+(t.amount||0);});
  const catData=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const tab=S.financeTab;
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];

  el.innerHTML=`
    <div class="page-header">
      <div><h1 class="page-title">Finanzas</h1><p class="page-sub">Ciclo ${period.label}</p></div>
      <div style="display:flex;gap:8px">
        <button onclick="openModal('modal-income')" style="padding:7px 12px;background:var(--green-bg);border:none;border-radius:10px;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans'">+ Ingreso</button>
        <button onclick="openModal('modal-expense')" style="padding:7px 12px;background:var(--red-bg);border:none;border-radius:10px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans'">+ Gasto</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab==='resumen'?'active':''}" onclick="S.financeTab='resumen';renderFinances()">Resumen</button>
      <button class="tab-btn ${tab==='gastos'?'active':''}" onclick="S.financeTab='gastos';renderFinances()">Movimientos</button>
    </div>
    ${tab==='resumen'?`
      <div class="grid2" style="margin-bottom:10px">
        <div class="card"><div class="card-label">Ingresos</div><div class="card-value c-green" style="font-size:19px">${fmt(income)}</div></div>
        <div class="card"><div class="card-label">Gastos</div><div class="card-value c-red" style="font-size:19px">${fmt(expenses)}</div></div>
        <div class="card"><div class="card-label">Disponible</div><div class="card-value c-blue" style="font-size:19px">${fmt(available)}</div></div>
        <div class="card"><div class="card-label">Ahorrado 💰</div><div class="card-value c-green" style="font-size:19px">${fmt(savings)}</div><div class="card-note">este ciclo</div></div>
      </div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-label">Gastos fijos vs variables</div>
        <div class="grid2" style="margin-top:10px;gap:20px">
          <div><p style="font-size:11px;color:var(--text2)">Fijos</p><p style="font-size:18px;font-weight:700;color:var(--blue)">${fmt(fixed)}</p>
            <div class="bar-track"><div class="bar-fill" style="width:${expenses>0?Math.round(fixed/expenses*100):0}%;background:var(--blue)"></div></div>
            <p style="font-size:10px;color:var(--text3);margin-top:3px">${expenses>0?Math.round(fixed/expenses*100):0}% del total</p></div>
          <div><p style="font-size:11px;color:var(--text2)">Variables</p><p style="font-size:18px;font-weight:700;color:var(--red)">${fmt(expenses-fixed)}</p>
            <div class="bar-track"><div class="bar-fill" style="width:${expenses>0?Math.round((expenses-fixed)/expenses*100):0}%;background:var(--red)"></div></div>
            <p style="font-size:10px;color:var(--text3);margin-top:3px">${expenses>0?Math.round((expenses-fixed)/expenses*100):0}% del total</p></div>
        </div>
      </div>
      ${catData.length>0?`<div class="card" style="margin-bottom:20px">
        <div class="card-label" style="margin-bottom:10px">Top categorías</div>
        ${catData.slice(0,5).map(([cat,val],i)=>{
          const pct=(expenses+savings)>0?Math.round(val/(expenses+savings)*100):0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:12px;font-weight:500">${medals[i]} ${cat}</span>
              <span style="font-size:12px;font-weight:600">${fmt(val)} <span style="color:var(--text3);font-size:10px">${pct}%</span></span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--blue)"></div></div>
          </div>`;
        }).join('')}
      </div>`:''}
    `:`
      <div class="card" style="margin-bottom:20px">
        ${ptxs.length===0?'<p style="font-size:13px;color:var(--text3);text-align:center;padding:24px">Sin movimientos este ciclo</p>':
          ptxs.map(tx=>`
            <div class="row-item">
              <div class="row-icon" style="background:${tx.type==='income'?'var(--green-bg)':tx.category==='Ahorro / Inversión'?'var(--blue-bg)':'var(--red-bg)'}">
                ${tx.type==='income'?'💰':tx.category==='Ahorro / Inversión'?'🏦':'💸'}
              </div>
              <div style="flex:1;min-width:0">
                <div class="row-name">${tx.description||tx.category}</div>
                <div class="row-sub">${tx.category} · ${tx.date}${tx.is_recurring?' · 🔁':''}</div>
              </div>
              <span style="font-size:13px;font-weight:700;margin-right:8px;color:${tx.type==='income'?'var(--green)':tx.category==='Ahorro / Inversión'?'var(--blue)':'var(--red)'}">${tx.type==='income'?'+':'-'}${(tx.amount||0).toFixed(2)}€</span>
              <button class="row-del" onclick="delTx('${tx.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
            </div>`).join('')}
      </div>`}
  `;
}
async function delTx(id){await db.delete('transactions',id);S.transactions=S.transactions.filter(t=>t.id!==id);renderFinances();}

// ─── HABITS ──────────────────────────────────────────────────────────────────
async function renderHabits() {
  const el=document.getElementById('view-habits');
  el.innerHTML='<div class="spinner"></div>';
  const [habits,logs]=await Promise.all([db.get('habits',{order:'created_at.asc'}),db.get('habit_logs',{order:'date.desc',limit:500})]);
  S.habits=habits; S.habitLogs=logs;
  const days=getLast14Days();
  const dayLetters=days.map(d=>['D','L','M','X','J','V','S'][new Date(d+'T12:00:00').getDay()]);
  const active=habits.filter(h=>h.is_active);

  el.innerHTML=`
    <div class="page-header">
      <div><h1 class="page-title">Hábitos</h1></div>
      <button onclick="openModal('modal-habit')" style="padding:7px 12px;background:var(--purple-bg);border:none;border-radius:10px;color:var(--purple);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans'">+ Nuevo</button>
    </div>
    ${active.length===0?`<div class="empty"><div class="empty-icon">✅</div><p>Crea tu primer hábito</p></div>`:`
    <div class="card" style="margin-bottom:20px">
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table class="habit-table">
          <thead><tr>
            <th style="text-align:left;padding:4px 0;min-width:100px;font-size:10px;color:var(--text3)">Hábito</th>
            ${days.map((d,i)=>`<th style="padding:4px 3px;min-width:30px">
              <div style="font-size:9px;color:var(--text3)">${dayLetters[i]}</div>
              <div style="font-size:10px;font-weight:${d===today?'700':'400'};color:${d===today?'var(--blue)':'var(--text2)'}">${new Date(d+'T12:00:00').getDate()}</div>
            </th>`).join('')}
            <th style="padding:4px 6px;font-size:10px;color:var(--text3)">🔥</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${active.map(h=>{
              let streak=0; const sorted=[...days].reverse();
              for(const d of sorted){if(logs.some(l=>l.habit_id===h.id&&l.date===d))streak++;else break;}
              return `<tr>
                <td style="padding:6px 0"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:14px">${h.icon||'✨'}</span><span style="font-size:12px;font-weight:500">${h.name}</span></div></td>
                ${days.map(d=>{
                  const done=logs.some(l=>l.habit_id===h.id&&l.date===d);
                  const isToday=d===today;
                  return `<td style="padding:3px"><button onclick="toggleHabitLog('${h.id}','${d}')" class="habit-cell ${done?'done':''} ${isToday&&!done?'today-cell':''}">${done?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:''}</button></td>`;
                }).join('')}
                <td style="text-align:center;font-size:12px;font-weight:700;color:var(--green);padding:3px 6px">${streak}</td>
                <td><button onclick="delHabit('${h.id}')" class="row-del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`}
  `;
}
async function toggleHabitLog(habitId,date) {
  const ex=S.habitLogs.find(l=>l.habit_id===habitId&&l.date===date);
  if(ex){await db.delete('habit_logs',ex.id);S.habitLogs=S.habitLogs.filter(l=>l.id!==ex.id);}
  else{const n=await db.insert('habit_logs',{habit_id:habitId,date,completed:true});S.habitLogs.push(n);}
  renderHabits();
}
async function delHabit(id){await db.delete('habits',id);renderHabits();}

            </div>
          </div>
          <button onclick="delTask('${t.id}')" class="row-del"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
        </div>`;
      }).join('')}
  `;
}
async function toggleTask(id,completed){await db.update('tasks',id,{completed:!completed});renderTasks();}
async function delTask(id){await db.delete('tasks',id);renderTasks();}

// ─── TRIPS ───────────────────────────────────────────────────────────────────
async function renderTrips() {
  const el=document.getElementById('view-trips');
  el.innerHTML='<div class="spinner"></div>';
  const trips=await db.get('trips',{order:'start_date.desc',limit:50});
  S.trips=trips;
  const sc={planning:{label:'Planificando',color:'var(--purple)'},upcoming:{label:'Próximo',color:'var(--blue)'},ongoing:{label:'En curso',color:'var(--green)'},completed:{label:'Completado',color:'var(--text3)'}};

  el.innerHTML=`
    <div class="page-header">
      <div><h1 class="page-title">Viajes</h1></div>
      <button onclick="openTripModal()" style="padding:7px 12px;background:var(--blue-bg);border:none;border-radius:10px;color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans'">+ Nuevo</button>
    </div>
    ${trips.length===0?`<div class="empty"><div class="empty-icon">✈️</div><p>Sin viajes planificados</p></div>`:
      trips.map(trip=>{
        const s=sc[trip.status]||sc.planning;
        const days=Math.round((new Date(trip.end_date)-new Date(trip.start_date))/86400000);
        const daysUntil=Math.ceil((new Date(trip.start_date)-new Date())/86400000);
        return `<div class="trip-card" onclick="editTrip('${trip.id}')">
          <div class="trip-bg">${trip.photo_url?`<img src="${trip.photo_url}" alt="${trip.destination}"/>`:''}
          </div>
          <div class="trip-overlay"></div>
          <div class="trip-content">
            <div style="display:flex;gap:8px;margin-bottom:6px">
              <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff">${s.label}</span>
              <span style="font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)">${trip.trip_type==='work'?'💼':'🌴'}</span>
            </div>
            <p style="font-size:18px;font-weight:700;color:#fff;margin-bottom:2px">📍 ${trip.destination}</p>
            ${trip.summary?`<p style="font-size:12px;color:rgba(255,255,255,.7);font-style:italic;margin-bottom:5px">"${trip.summary}"</p>`:''}
            <div style="display:flex;gap:12px;font-size:11px;color:rgba(255,255,255,.6)">
              <span>${trip.start_date} → ${trip.end_date}</span>
              <span>${days}d</span>
              ${daysUntil>0&&trip.status!=='completed'?`<span style="color:#fbbf24;font-weight:600">En ${daysUntil}d</span>`:''}
            </div>
          </div>
        </div>`;
      }).join('')}
  `;
}
function openTripModal(){S.editingTrip=null;document.getElementById('trip-modal-title').textContent='Nuevo viaje';['trip-dest','trip-summary','trip-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('trip-start').value=today;document.getElementById('trip-end').value=today;document.getElementById('trip-type').value='leisure';document.getElementById('trip-status').value='planning';openModal('modal-trip');}
function editTrip(id){const t=S.trips.find(t=>t.id===id);if(!t)return;S.editingTrip=t;document.getElementById('trip-modal-title').textContent='Editar viaje';document.getElementById('trip-dest').value=t.destination||'';document.getElementById('trip-summary').value=t.summary||'';document.getElementById('trip-start').value=t.start_date||today;document.getElementById('trip-end').value=t.end_date||today;document.getElementById('trip-type').value=t.trip_type||'leisure';document.getElementById('trip-status').value=t.status||'planning';document.getElementById('trip-notes').value=t.notes||'';openModal('modal-trip');}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
async function renderSettings() {
  const el=document.getElementById('view-settings');
  el.innerHTML='<div class="spinner"></div>';
  const s=await db.get('user_settings',{order:'created_at.desc',limit:1});
  const cfg=s[0]||{}; S.settings=cfg;
  el.innerHTML=`
    <div class="page-header"><h1 class="page-title">Ajustes</h1></div>
    <div class="settings-section">
      <h2>Datos corporales</h2>
      <div class="grid2" style="gap:10px">
        <div class="field"><label>Altura (cm)</label><input type="number" id="s-height" value="${cfg.height_cm||''}" placeholder="175"/></div>
        <div class="field"><label>Peso (kg)</label><input type="number" id="s-weight" value="${cfg.weight_kg||''}" placeholder="75"/></div>
        <div class="field"><label>Edad</label><input type="number" id="s-age" value="${cfg.age||''}" placeholder="30"/></div>
        <div class="field"><label>Sexo</label><select id="s-gender"><option value="male" ${cfg.gender==='male'?'selected':''}>Hombre</option><option value="female" ${cfg.gender==='female'?'selected':''}>Mujer</option></select></div>
      </div>
      <div class="field"><label>Nivel de actividad</label>
        <select id="s-activity">
          <option value="sedentary" ${cfg.activity_level==='sedentary'?'selected':''}>Sedentario</option>
          <option value="light" ${cfg.activity_level==='light'?'selected':''}>Ligero (1-2 días/semana)</option>
          <option value="moderate" ${!cfg.activity_level||cfg.activity_level==='moderate'?'selected':''}>Moderado (3-5 días/semana)</option>
          <option value="active" ${cfg.activity_level==='active'?'selected':''}>Activo (6-7 días/semana)</option>
          <option value="very_active" ${cfg.activity_level==='very_active'?'selected':''}>Muy activo</option>
        </select>
      </div>
    </div>
    <div class="settings-section">
      <h2>Finanzas</h2>
      <div class="field"><label>Día inicio de ciclo</label><input type="number" id="s-billing" min="1" max="31" value="${cfg.billing_day||1}"/></div>
      <p style="font-size:11px;color:var(--text3)">Ej: si cobras el día 25, pon 25</p>
    </div>
    <div class="settings-section">
      <h2>Nutrición</h2>
      <div class="field"><label>Objetivo diario (kcal)</label><input type="number" id="s-calories" value="${cfg.daily_calorie_goal||2000}"/></div>
    </div>
    <button class="btn btn-primary" id="save-settings-btn" onclick="saveSettings()" style="margin-bottom:24px">Guardar ajustes</button>
  `;
}

// ─── SAVES ───────────────────────────────────────────────────────────────────
async function saveExpense(){
  const amount=parseFloat(document.getElementById('exp-amount').value);
  const category=document.getElementById('exp-cat').value;
  const description=document.getElementById('exp-desc').value;
  const date=document.getElementById('exp-date').value||today;
  const recurring=document.getElementById('exp-recurring').classList.contains('on');
  if(!amount||!category)return;
  await db.insert('transactions',{type:'expense',amount,category,description,date,is_recurring:recurring});
  S.transactions=[];closeModal('modal-expense');document.getElementById('exp-amount').value='';
  if(S.page==='finances')renderFinances();else if(S.page==='dashboard')renderDashboard();
}
async function saveIncome(){
  const amount=parseFloat(document.getElementById('inc-amount').value);
  const category=document.getElementById('inc-cat').value;
  const description=document.getElementById('inc-desc').value;
  const date=document.getElementById('inc-date').value||today;
  if(!amount)return;
  await db.insert('transactions',{type:'income',amount,category,description,date});
  S.transactions=[];closeModal('modal-income');document.getElementById('inc-amount').value='';
  if(S.page==='finances')renderFinances();else if(S.page==='dashboard')renderDashboard();
}
async function saveMeal(){
  const name=document.getElementById('meal-name').value;
  const mealType=document.getElementById('meal-type').value;
  const date=document.getElementById('meal-date').value||today;
  if(!name)return;
  const btn=document.getElementById('meal-submit-btn');
  btn.disabled=true;btn.textContent='Analizando con IA...';
  let cal=200,pro=10,car=20,fat=8;
  try {
    const r=await fetch('/api/nutrition',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({food:name})
    });
    if(r.ok){
      const macros=await r.json();
      cal=macros.calories||200;pro=macros.protein||10;car=macros.carbs||20;fat=macros.fat||8;
    }
  } catch(e){console.error('Nutrition API error:',e);}
  await db.insert('meals',{name,meal_type:mealType,date,calories:Math.round(cal),protein:Math.round(pro),carbs:Math.round(car),fat:Math.round(fat)});
  closeModal('modal-meal');document.getElementById('meal-name').value='';
  btn.disabled=false;btn.textContent='Registrar comida';
  if(S.page==='nutrition')renderNutrition();else if(S.page==='dashboard')renderDashboard();
}
async function saveExercise(){
  const sport_type=document.getElementById('ex-type').value;
  const duration_minutes=parseInt(document.getElementById('ex-duration').value);
  if(!duration_minutes)return;
  const calories_burned=parseInt(document.getElementById('ex-calories').value)||null;
  const date=document.getElementById('ex-date').value||today;
  const notes=document.getElementById('ex-notes').value;
  const muscle_groups=[...document.querySelectorAll('#ex-muscles .pill.selected')].map(p=>p.textContent);
  const distance_km=parseFloat(document.getElementById('ex-distance').value)||null;
  const avg_pace=document.getElementById('ex-pace').value||null;
  const payload={sport_type,duration_minutes,date};
  if(notes)payload.notes=notes;if(calories_burned)payload.calories_burned=calories_burned;
  if(muscle_groups.length)payload.muscle_groups=muscle_groups;if(distance_km)payload.distance_km=distance_km;if(avg_pace)payload.avg_pace=avg_pace;
  await db.insert('exercises',payload);
  closeModal('modal-exercise');document.getElementById('ex-duration').value='';document.getElementById('ex-calories').value='';
  if(S.page==='exercise')renderExercise();
}
async function saveTask(){
  const title=document.getElementById('task-title').value;
  if(!title)return;
  const description=document.getElementById('task-desc').value;
  const due_date=document.getElementById('task-due').value||null;
  const priority=document.getElementById('task-priority').value;
  await db.insert('tasks',{title,description,due_date,priority,completed:false});
  closeModal('modal-task');document.getElementById('task-title').value='';document.getElementById('task-desc').value='';
  if(S.page==='tasks')renderTasks();else if(S.page==='dashboard')renderDashboard();
}
async function saveHabit(){
  const name=document.getElementById('habit-name').value;
  if(!name)return;
  const icon=document.getElementById('habit-icon').value||'✨';
  await db.insert('habits',{name,icon,is_active:true});
  closeModal('modal-habit');document.getElementById('habit-name').value='';
  if(S.page==='habits')renderHabits();else if(S.page==='dashboard')renderDashboard();
}
async function saveTrip(){
  const destination=document.getElementById('trip-dest').value;
  const start_date=document.getElementById('trip-start').value;
  const end_date=document.getElementById('trip-end').value;
  if(!destination||!start_date||!end_date)return;
  const payload={destination,summary:document.getElementById('trip-summary').value,start_date,end_date,trip_type:document.getElementById('trip-type').value,status:document.getElementById('trip-status').value,notes:document.getElementById('trip-notes').value};
  if(S.editingTrip)await db.update('trips',S.editingTrip.id,payload);
  else await db.insert('trips',payload);
  closeModal('modal-trip');renderTrips();
}
async function saveSettings(){
  const payload={height_cm:parseFloat(document.getElementById('s-height').value)||null,weight_kg:parseFloat(document.getElementById('s-weight').value)||null,age:parseInt(document.getElementById('s-age').value)||null,gender:document.getElementById('s-gender').value,activity_level:document.getElementById('s-activity').value,billing_day:parseInt(document.getElementById('s-billing').value)||1,daily_calorie_goal:parseInt(document.getElementById('s-calories').value)||2000};
  if(S.settings?.id)await db.update('user_settings',S.settings.id,payload);
  else await db.insert('user_settings',payload);
  S.settings=null;
  const btn=document.getElementById('save-settings-btn');
  if(btn){btn.textContent='✓ Guardado';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='Guardar ajustes';btn.style.background='';},2000);}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).style.display='flex';document.querySelectorAll(`#${id} input[type="date"]`).forEach(i=>{if(!i.value)i.value=today;});}
function closeModal(id){document.getElementById(id).style.display='none';}
function toggleQuick(){const o=document.getElementById('quick-overlay');const btn=document.getElementById('nav-plus');const open=o.style.display!=='none';o.style.display=open?'none':'block';btn.classList.toggle('open',!open);}
function closeQuick(){document.getElementById('quick-overlay').style.display='none';document.getElementById('nav-plus').classList.remove('open');}
function togglePill(el){el.classList.toggle('selected');}
function updateExerciseFields(){const s=document.getElementById('ex-type').value;document.getElementById('ex-muscles-field').style.display=s==='gym'?'block':'none';const sd=['running','cycling','walking'].includes(s);document.getElementById('ex-distance-field').style.display=sd?'block':'none';document.getElementById('ex-pace-field').style.display=['running','walking'].includes(s)?'block':'none';}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderDashboard();
</script>
</body>
</html>
